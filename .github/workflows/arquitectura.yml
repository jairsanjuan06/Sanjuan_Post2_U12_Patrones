name: Validacion Arquitectonica

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  arquitectura:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Cache de dependencias Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Compilar el proyecto
        run: mvn compile --no-transfer-progress

      - name: Ejecutar reglas ArchUnit
        run: mvn test -Dtest=ReglasArquitecturaTest --no-transfer-progress

      - name: Ejecutar suite completa de pruebas
        run: mvn verify --no-transfer-progress
